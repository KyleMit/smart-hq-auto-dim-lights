name: Auto Dim Fridge Lights

on:
  schedule:
    - cron: '0 10 * * *'  # 6am ET (UTC-4)
    - cron: '0 11 * * *'  # 7am ET (UTC-4)
    - cron: '0 23 * * *'  # 7pm ET (UTC-4)
    - cron: '0 0 * * *'   # 8pm ET (UTC-4)
  workflow_dispatch:
    inputs:
      brightness:
        description: 'Brightness value (0-100)'
        required: true
        default: '100'

jobs:
  dim-lights:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Determine brightness
        id: brightness
        uses: actions/github-script@v7
        with:
          # syntax highlighting from harrydowning.yaml-embedded-languages
          script: | #js
            if (context.eventName === 'workflow_dispatch') {
              core.setOutput('brightness', context.payload.inputs.brightness);
            } else {
              const schedule = {
                '0 10 * * *': 50,   // 6am ET
                '0 11 * * *': 100,  // 7am ET
                '0 23 * * *': 50,   // 7pm ET
                '0 0 * * *':  0,    // 8pm ET
              };
              const brightnessValue = schedule[context.payload.schedule] ?? 100;
              core.setOutput('brightness', brightnessValue);
            }

      - name: Set fridge brightness to ${{ steps.brightness.outputs.brightness }}%
        run: node src/auto-dim.js ${{ steps.brightness.outputs.brightness }}

        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
          SMARTHQ_CLIENT_ID: ${{ secrets.SMARTHQ_CLIENT_ID }}
          SMARTHQ_CLIENT_SECRET: ${{ secrets.SMARTHQ_CLIENT_SECRET }}
          SMARTHQ_REFRESH_TOKEN: ${{ secrets.SMARTHQ_REFRESH_TOKEN }}
          SMARTHQ_DEVICE_ID: ${{ secrets.SMARTHQ_DEVICE_ID }}
